name: Visual Regression

on:
  workflow_dispatch:
    inputs:
      action:
        description: compare = run tests against baseline, update = refresh baseline
        required: true
        default: compare
        type: choice
        options:
          - compare
          - update
      target_env:
        description: Environment under test (used for compare and update)
        required: true
        default: prod
        type: choice
        options:
          - dev
          - qa
          - prod
      baseline_env:
        description: Baseline env used only when action=compare (ignored for update)
        required: true
        default: prod
        type: choice
        options:
          - dev
          - qa
          - prod

  schedule:
    # Runs daily at 6:30 AM Central (11:30 UTC). GitHub cron uses UTC.
    - cron: "30 11 * * *"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  visual-regression:
    name: Run Visual Regression
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Resolve workflow inputs
        id: resolve-inputs
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "action=compare" >> "$GITHUB_OUTPUT"
            echo "target_env=dev" >> "$GITHUB_OUTPUT"
            echo "baseline_env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
            echo "target_env=${{ github.event.inputs.target_env }}" >> "$GITHUB_OUTPUT"
            echo "baseline_env=${{ github.event.inputs.baseline_env }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Print run configuration
        run: |
          action="${{ steps.resolve-inputs.outputs.action }}"
          target_env="${{ steps.resolve-inputs.outputs.target_env }}"
          baseline_env="${{ steps.resolve-inputs.outputs.baseline_env }}"

          if [ "$action" = "compare" ]; then
            echo "Running visual regression in [$target_env] vs [$baseline_env] baseline"
          else
            echo "Running visual regression update in [$target_env] (baseline_env ignored for update)"
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Restore visual baselines from visual-snapshots
        if: ${{ steps.resolve-inputs.outputs.action == 'compare' }}
        run: |
          baseline_env="${{ steps.resolve-inputs.outputs.baseline_env }}"
          visual_baseline_path="snaps/visual/${baseline_env}"
          landing_baseline_path="snaps/landing-pages/${baseline_env}"

          rm -rf snaps
          mkdir -p snaps
          git fetch origin visual-snapshots --depth=1 || true
          if git cat-file -e "origin/visual-snapshots:${visual_baseline_path}" 2>/dev/null; then
            git archive origin/visual-snapshots "${visual_baseline_path}" | tar -x
            echo "Restored baselines from visual-snapshots:${visual_baseline_path}."
          else
            echo "No baselines found at visual-snapshots:${visual_baseline_path}."
          fi

          if git cat-file -e "origin/visual-snapshots:${landing_baseline_path}" 2>/dev/null; then
            tmp_dir="$(mktemp -d)"
            git archive origin/visual-snapshots "${landing_baseline_path}" | tar -x -C "$tmp_dir"
            mkdir -p "snaps/visual/${baseline_env}"
            cp -R "$tmp_dir/${landing_baseline_path}/." "snaps/visual/${baseline_env}/"
            rm -rf "$tmp_dir"
            echo "Merged legacy landing-page baselines from visual-snapshots:${landing_baseline_path} into snaps/visual/${baseline_env}."
          else
            echo "No legacy landing-page baselines found at visual-snapshots:${landing_baseline_path}."
          fi

      - name: Run visual compare
        id: run-visual-compare
        if: ${{ steps.resolve-inputs.outputs.action == 'compare' }}
        run: |
          target_env="${{ steps.resolve-inputs.outputs.target_env }}"
          baseline_env="${{ steps.resolve-inputs.outputs.baseline_env }}"
          snapshot_suite="visual/${baseline_env}"

          PLAYWRIGHT_SNAPSHOT_SUITE="$snapshot_suite" ENV="$target_env" npx playwright test tests/visual/visual-regression.spec.ts tests/visual/landing-pages
        continue-on-error: true

      - name: Run visual baseline update
        if: ${{ steps.resolve-inputs.outputs.action == 'update' }}
        run: |
          target_env="${{ steps.resolve-inputs.outputs.target_env }}"
          snapshot_suite="visual/${target_env}"

          PLAYWRIGHT_SNAPSHOT_SUITE="$snapshot_suite" ENV="$target_env" npx playwright test tests/visual/visual-regression.spec.ts tests/visual/landing-pages --update-snapshots

      - name: Checkout snapshot branch workspace
        if: ${{ steps.resolve-inputs.outputs.action == 'update' && success() }}
        uses: actions/checkout@v4
        with:
          path: .snapshot-store

      - name: Publish visual baselines to visual-snapshots
        if: ${{ steps.resolve-inputs.outputs.action == 'update' && success() }}
        run: |
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          target_env="${{ steps.resolve-inputs.outputs.target_env }}"
          snapshot_suite_path="snaps/visual/${target_env}"
          metadata_path="metadata/visual/${target_env}.json"

          cd .snapshot-store
          git fetch origin visual-snapshots --depth=1 || true

          if git show-ref --verify --quiet refs/remotes/origin/visual-snapshots; then
            git checkout -B visual-snapshots origin/visual-snapshots
          else
            git checkout --orphan visual-snapshots
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          rm -rf "${snapshot_suite_path}"
          rm -f "${metadata_path}"
          mkdir -p "$(dirname "${snapshot_suite_path}")" "$(dirname "${metadata_path}")"
          cp -R "../${snapshot_suite_path}" "./${snapshot_suite_path}"

          cat > "${metadata_path}" <<EOF
          {
            "suite": "visual",
            "environment": "${target_env}",
            "updatedAt": "${timestamp}",
            "sourceBranch": "${GITHUB_REF_NAME}",
            "sourceSha": "${GITHUB_SHA}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${snapshot_suite_path}" "${metadata_path}"

          if git diff --cached --quiet; then
            echo "No visual baseline changes to publish."
            exit 0
          fi

          git commit -m "Update visual snapshots (${target_env})"
          git push origin visual-snapshots --force

      - name: Save visual report for dashboard
        if: ${{ always() && steps.resolve-inputs.outputs.action == 'compare' }}
        run: |
          target_env="${{ steps.resolve-inputs.outputs.target_env }}"
          baseline_env="${{ steps.resolve-inputs.outputs.baseline_env }}"
          baseline_meta_path="metadata/visual/${baseline_env}.json"
          baseline_updated_at=""

          if git cat-file -e "origin/visual-snapshots:${baseline_meta_path}" 2>/dev/null; then
            baseline_updated_at="$(git show "origin/visual-snapshots:${baseline_meta_path}" | node -e 'const fs=require("fs");const raw=fs.readFileSync(0,"utf8");const obj=JSON.parse(raw);process.stdout.write(obj.updatedAt||"")')"
          fi

          mkdir -p "dashboard/visual"
          cat > "dashboard/visual/last-run.json" <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
            "suite": "visual",
            "action": "compare",
            "runEnvironment": "${target_env}",
            "baselineEnvironment": "${baseline_env}",
            "baselineUpdatedAt": "${baseline_updated_at}"
          }
          EOF

          if [ -d "playwright-report" ]; then
            rm -rf "dashboard/visual/playwright-report"
            cp -R playwright-report "dashboard/visual/"
          fi

      - name: Build dashboard homepage
        if: ${{ always() && steps.resolve-inputs.outputs.action == 'compare' }}
        run: node scripts/build-dashboard-index.js

      - name: Show visual report sizes
        if: ${{ always() && steps.resolve-inputs.outputs.action == 'compare' }}
        run: |
          du -sh playwright-report || true
          du -sh test-results || true
          du -sh "dashboard/visual" || true

      - name: Upload visual Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload visual test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: warn

      - name: Publish visual report to GitHub Pages
        if: ${{ always() && steps.resolve-inputs.outputs.action == 'compare' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: false

      - name: Notify Teams on visual failure
        if: ${{ always() && steps.resolve-inputs.outputs.action == 'compare' && steps.run-visual-compare.outcome == 'failure' }}
        uses: ./.github/actions/teams-notify
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          suite_name: ${{ steps.resolve-inputs.outputs.suite == 'visual' && 'Visual Regression' || 'Landing Page Visual Regression' }}
          status: ${{ steps.run-visual-compare.outcome }}
          report_path: ${{ steps.resolve-inputs.outputs.suite == 'visual' && 'visual/playwright-report/index.html' || 'landing-pages/playwright-report/index.html' }}
