name: Analytics Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analytics-validation:
    name: Run Analytics Validation
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run analytics validation tests
        run: npx playwright test -g @analytics

      - name: Upload Playwright analytics report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-validation-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright JSON report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-validation-json-report
          path: playwright-report.json
          retention-days: 30
          if-no-files-found: warn
