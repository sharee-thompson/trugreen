name: Analytics Validation

# For testing only, will not be needed after June 16th
env: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true

on:
  workflow_dispatch:

  schedule:
    # Runs monthly on the 1st at 11:30 AM Central during daylight saving time.
    # GitHub cron uses UTC.
    - cron: "30 16 1 * *"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  analytics-validation:
    name: Run Analytics Validation
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      # For testing only, can change back to "node-version: lts/*"" after June 16
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run analytics validation tests
        run: npx playwright test -g @analytics

      - name: Save analytics report for dashboard
        if: always()
        run: |
          mkdir -p dashboard/analytics
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/analytics/last-run.json
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/analytics/playwright-report
            cp -R playwright-report dashboard/analytics/
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload analytics Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: analytics-validation-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload analytics JSON report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: analytics-validation-json-report
          path: playwright-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Publish analytics report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: true
