name: Storybook Visual Regression

on:
  workflow_dispatch:
    inputs:
      action:
        description: Snapshot action to run
        required: true
        default: compare
        type: choice
        options:
          - compare
          - update

  repository_dispatch:
    types: [netlify-deploy-success] # This name must match the event_type sent by the webhook

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  storybook-visual-regression:
    name: Run Storybook Visual Regression
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.6
        with:
          fetch-depth: 1

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- index.html
          fi

      - name: Setup Node
        uses: actions/setup-node@v4.0.1
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Restore Storybook baselines from visual-snapshots
        if: ${{ github.event.inputs.action == 'compare' }}
        run: |
          rm -rf snaps/storybook
          mkdir -p snaps
          git fetch origin visual-snapshots --depth=1 || true
          if git cat-file -e origin/visual-snapshots:snaps/storybook 2>/dev/null; then
            git archive origin/visual-snapshots snaps/storybook | tar -x
            echo "Restored Storybook baselines from visual-snapshots."
          else
            echo "No Storybook baselines found on visual-snapshots."
          fi

      - name: Run Storybook compare
        id: run-storybook-compare
        if: ${{ github.event.inputs.action == 'compare' }}
        run: npm run test:storybook
        continue-on-error: true

      - name: Run Storybook baseline update
        if: ${{ github.event.inputs.action == 'update' }}
        run: npm run test:storybook:update

      - name: Checkout snapshot branch workspace
        if: ${{ github.event.inputs.action == 'update' && success() }}
        uses: actions/checkout@v4.1.6
        with:
          path: .snapshot-store
          fetch-depth: 1

      - name: Publish Storybook baselines to visual-snapshots
        if: ${{ github.event.inputs.action == 'update' && success() }}
        run: |
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cd .snapshot-store
          git fetch origin visual-snapshots --depth=1 || true

          if git show-ref --verify --quiet refs/remotes/origin/visual-snapshots; then
            git checkout -B visual-snapshots origin/visual-snapshots
          else
            git checkout --orphan visual-snapshots
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          rm -rf snaps/storybook
          rm -f metadata/storybook.json metadata/storybook-inventory.md
          mkdir -p snaps metadata
          cp -R ../snaps/storybook ./snaps/

          if [ -f ../tests/visual/storybook/storybook-inventory.md ]; then
            cp ../tests/visual/storybook/storybook-inventory.md metadata/storybook-inventory.md
          fi

          cat > metadata/storybook.json <<EOF
          {
            "suite": "storybook",
            "updatedAt": "${timestamp}",
            "sourceBranch": "${GITHUB_REF_NAME}",
            "sourceSha": "${GITHUB_SHA}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snaps/storybook metadata/storybook.json metadata/storybook-inventory.md

          if git diff --cached --quiet; then
            echo "No Storybook baseline changes to publish."
            exit 0
          fi

          git commit -m "Update Storybook snapshots"
          git push origin visual-snapshots --force

      - name: Save Storybook report for dashboard
        if: ${{ always() && github.event.inputs.action == 'compare' }}
        run: |
          mkdir -p dashboard/storybook
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/storybook/last-run.json
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/storybook/playwright-report
            cp -R playwright-report dashboard/storybook/
          fi
          if [ -f "tests/visual/storybook/storybook-inventory.md" ]; then
            cp tests/visual/storybook/storybook-inventory.md dashboard/storybook/
          fi

      - name: Build dashboard homepage
        if: ${{ always() && github.event.inputs.action == 'compare' }}
        run: node scripts/build-dashboard-index.js

      - name: Upload Storybook Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: storybook-playwright-report
          path: playwright-report/
          retention-days: 1
          if-no-files-found: warn

      - name: Upload Storybook inventory artifact
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: storybook-inventory
          path: tests/visual/storybook/storybook-inventory.md
          retention-days: 1
          if-no-files-found: warn

      - name: Upload Storybook test results artifact
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: storybook-test-results
          path: test-results/
          retention-days: 1
          if-no-files-found: warn

      - name: Clean up old reports
        if: always()
        run: bash scripts/cleanup-old-reports.sh

      - name: Publish Storybook report to GitHub Pages
        if: ${{ always() && github.event.inputs.action == 'compare' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: false

