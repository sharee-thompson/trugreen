name: Link Validation

on:
  workflow_dispatch:
  schedule:
    # Runs weekly on Monday at 9:00 AM Central during daylight saving time.
    # GitHub cron uses UTC.
    - cron: "0 14 * * 1"

permissions:
  contents: write

concurrency:
  group: link-validation-dashboard
  cancel-in-progress: true

jobs:
  link-validation:
    name: Run Link Validation
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run link validation tests
        id: run-link-validation
        run: npx playwright test --grep @link-validator --project=chromium
        continue-on-error: true

      - name: Save link report for dashboard
        if: always()
        run: |
          mkdir -p dashboard/link
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/link/last-run.json
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/link/playwright-report
            cp -R playwright-report dashboard/link/
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload link report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-validation-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Clean up old reports
        if: always()
        run: bash scripts/cleanup-old-reports.sh

      - name: Publish link report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: false

      - name: Notify Teams on link validation failure
        if: ${{ always() && steps.run-link-validation.outcome == 'failure' }}
        uses: ./.github/actions/teams-notify
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          suite_name: Link Validation
          status: ${{ steps.run-link-validation.outcome }}
          report_path: link/playwright-report/index.html
