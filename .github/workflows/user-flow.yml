name: User Flow Validation

on:
  workflow_dispatch:

  schedule:
    # Runs daily at 8:00 AM Central during daylight saving time.
    # GitHub cron uses UTC.
    - cron: "0 13 * * *"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  user-flow-validation:
    name: Run User Flow Validation
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run buy flow e sanity test
        run: npx playwright test tests/functional/buy-flow/buy-flow-e-sanity.spec.ts --grep @buy-flow-e

      - name: Save user flow report for dashboard
        if: always()
        run: |
          mkdir -p dashboard/user-flow
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/user-flow/playwright-report
            cp -R playwright-report dashboard/user-flow/
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload user flow Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-flow-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload user flow JSON report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-flow-json-report
          path: playwright-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Publish user flow report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: true
