name: Accessibility Audit

on:
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: prod
        type: choice
        options:
          - dev
          - qa
          - prod

  schedule:
    # Runs monthly on the 1st at 11:00 AM Central during daylight saving time.
    # GitHub cron uses UTC.
    - cron: "0 16 1 * *"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  accessibility-audit:
    name: Run Accessibility Audit
    timeout-minutes: 45
    runs-on: ubuntu-latest

    env:
      ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || 'prod' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.6
        with:
          fetch-depth: 1

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Setup Node
        uses: actions/setup-node@v4.0.1
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Clear old accessibility reports
        run: rm -rf accessibility-reports

      - name: Run accessibility audit
        id: run-accessibility-audit
        run: npx playwright test -g @accessibility-audit
        continue-on-error: true

      - name: Build accessibility index report
        if: always()
        run: node scripts/build-axe-index.js

      - name: Build common issues report
        if: always()
        run: node scripts/build-axe-common-issues.js

      - name: Save accessibility report for dashboard
        if: always()
        run: |
          mkdir -p dashboard/accessibility
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/accessibility/last-run.json
          if [ -d "accessibility-reports" ]; then
            cp -R accessibility-reports dashboard/accessibility/accessibility-reports
          fi
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/accessibility/playwright-report
            cp -R playwright-report dashboard/accessibility/playwright-report
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload accessibility report artifact
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: accessibility-audit-report
          path: accessibility-reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Clean up old reports
        if: always()
        run: bash scripts/cleanup-old-reports.sh

      - name: Publish accessibility report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: false
