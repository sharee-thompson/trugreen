name: Performance Audit

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: shared-dashboard-publish
  cancel-in-progress: false

jobs:
  performance-audit:
    name: Run Performance Audit
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Restore prior performance history
        run: |
          mkdir -p performance-report
          if [ -f "dashboard/performance/performance-report/performance-history-seconds.csv" ]; then
            cp dashboard/performance/performance-report/performance-history-seconds.csv performance-report/performance-history-seconds.csv
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run performance audit
        run: npm run performance:audit
        continue-on-error: true

      - name: Build performance dashboard
        if: always()
        run: npm run performance:report

      - name: Build performance report index page
        if: always()
        run: |
          mkdir -p performance-report

          cat > performance-report/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>TruGreen Performance Audit</title>
            <style>
              :root {
                --navy: #172b4d;
                --text: #0f2144;
                --muted: #5e6c84;
                --background: #f7f9fb;
                --card: #ffffff;
                --border: #dfe1e6;
                --button: #2563b8;
                --button-hover: #174ea6;
                --shadow: rgba(0, 0, 0, 0.06);
              }

              * {
                box-sizing: border-box;
              }

              body {
                font-family: Arial, sans-serif;
                margin: 0;
                background: var(--background);
                color: var(--text);
              }

              .page {
                max-width: 900px;
                margin: 0 auto;
                padding: 40px 24px;
              }

              .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 14px;
                padding: 28px;
                box-shadow: 0 2px 8px var(--shadow);
              }

              h1 {
                margin-top: 0;
                margin-bottom: 8px;
                color: var(--navy);
                font-size: 32px;
              }

              p {
                line-height: 1.5;
                margin-bottom: 0;
              }

              .meta {
                color: var(--muted);
                margin-top: 8px;
              }

              .links {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                margin-top: 22px;
              }

              a.button {
                display: inline-block;
                padding: 12px 18px;
                background: var(--button);
                color: #ffffff;
                text-decoration: none;
                border-radius: 8px;
                font-weight: bold;
              }

              a.button:hover {
                background: var(--button-hover);
              }
            </style>
          </head>
          <body>
            <main class="page">
              <section class="card">
                <h1>TruGreen Performance Audit</h1>
                <p>This report includes the latest aggregated performance history generated by the performance audit workflow.</p>
                <p class="meta">The CSV includes performance metrics by run, project, device profile, page, and URL.</p>

                <div class="links">
                  <a class="button" href="./performance-history-seconds.csv" target="_blank" rel="noopener noreferrer">View Performance History CSV</a>
                </div>
              </section>
            </main>
          </body>
          </html>
          EOF

      - name: Save performance report for dashboard
        if: always()
        run: |
          rm -rf dashboard/performance/performance-report
          mkdir -p dashboard/performance
          if [ -d "performance-report" ]; then
            cp -R performance-report dashboard/performance/performance-report
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload performance report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: performance-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload performance Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload performance JSON report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-json-report
          path: playwright-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Publish performance report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: true
