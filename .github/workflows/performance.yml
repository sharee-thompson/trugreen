name: Performance Audit

# For testing only, will not be needed after June 16th
env: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true

on:
  workflow_dispatch:

  schedule:
    # Runs weekly on Monday at 9:20 AM Central during daylight saving time.
    # GitHub cron uses UTC.
    - cron: "20 14 * * 1"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  performance-audit:
    name: Run Performance Audit
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Restore prior performance history
        run: |
          mkdir -p performance-report

          if [ -f "dashboard/performance/performance-report/performance-history-seconds.csv" ]; then
            cp dashboard/performance/performance-report/performance-history-seconds.csv performance-report/performance-history-seconds.csv
          fi

      # For testing only, can change back to "node-version: lts/*"" after June 16
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run performance audit
        run: npm run performance:audit
        continue-on-error: true

      - name: Build performance dashboard
        if: always()
        run: npm run performance:report

      - name: Save performance report for dashboard
        if: always()
        run: |
          rm -rf dashboard/performance/performance-report
          mkdir -p dashboard/performance
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/performance/last-run.json
          if [ -d "performance-report" ]; then
            cp -R performance-report dashboard/performance/performance-report
          fi
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/performance/playwright-report
            cp -R playwright-report dashboard/performance/playwright-report
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload performance report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-report
          path: performance-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload performance Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload performance JSON report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-json-report
          path: playwright-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Publish performance report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: true
