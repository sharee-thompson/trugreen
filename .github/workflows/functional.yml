name: Functional Validation

on:
  workflow_dispatch:
    inputs:
      env:
        description: Target environment
        required: true
        default: prod
        type: choice
        options:
          - dev
          - qa
          - prod

  schedule:
    # Runs daily at 6:20 AM Central (11:20 UTC). GitHub cron uses UTC.
    - cron: "20 11 * * *"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  functional-validation:
    name: Run Functional Validation
    timeout-minutes: 45
    runs-on: ubuntu-latest

    env:
      ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || 'prod' }}
      LANDING_PAGE_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || 'dev' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run buy flow original sanity test
        run: |
          npx playwright test -g @functional

      - name: Save functional report for dashboard
        if: always()
        run: |
          mkdir -p dashboard/functional
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/functional/last-run.json
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/functional/playwright-report
            cp -R playwright-report dashboard/functional/
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload functional Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload functional JSON report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-json-report
          path: playwright-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Publish functional report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: true
