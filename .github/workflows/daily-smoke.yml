name: Daily Smoke Tests

on:
  workflow_dispatch:

  schedule:
    # Runs daily at 8:00 AM Central during daylight saving time.
    # GitHub cron uses UTC.
    - cron: "0 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-smoke-pages
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Run Smoke Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests
        run: npx playwright test --grep @smoke

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Build GitHub Pages dashboard
        if: always()
        run: |
          mkdir -p public
          cp -R playwright-report public/playwright-report

          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>TruGreen Smoke Test Dashboard</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 40px;
                background: #f7f9fb;
                color: #172b4d;
              }
              .card {
                background: white;
                border: 1px solid #dfe1e6;
                border-radius: 12px;
                padding: 24px;
                max-width: 800px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06);
              }
              h1 {
                margin-top: 0;
              }
              a.button {
                display: inline-block;
                margin-top: 16px;
                padding: 12px 18px;
                background: #0b5cad;
                color: white;
                text-decoration: none;
                border-radius: 8px;
                font-weight: bold;
              }
              .meta {
                color: #5e6c84;
                margin-top: 12px;
              }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>TruGreen Smoke Test Dashboard</h1>
              <p>This page shows the latest published smoke test report from the automation pilot.</p>
              <a class="button" href="./playwright-report/index.html">View Latest Playwright Report</a>
              <p class="meta">Generated by GitHub Actions.</p>
            </div>
          </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: smoke-tests
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
