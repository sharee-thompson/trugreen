name: Smoke Tests

on:
  workflow_dispatch:

  schedule:
    # Runs daily at 6:00 AM Central (11:00 UTC). GitHub cron uses UTC.
    - cron: "0 11 * * *"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  smoke-tests:
    name: Run Smoke Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests
        run: npx playwright test --grep @smoke

      - name: Save smoke report for dashboard
        if: always()
        run: |
          mkdir -p dashboard/smoke
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/smoke/last-run.json
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/smoke/playwright-report
            cp -R playwright-report dashboard/smoke/
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload smoke report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Publish smoke report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: true

      - name: Notify Teams on smoke failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH_NAME: ${{ github.ref_name }}
          TRIGGERED_BY: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL is not configured; skipping Teams notification."
            exit 0
          fi

          RUN_URL="${SERVER_URL}/${REPOSITORY_OWNER}/${REPOSITORY_NAME}/actions/runs/${RUN_ID}"
          REPORT_URL="https://${REPOSITORY_OWNER}.github.io/${REPOSITORY_NAME}/smoke/playwright-report/index.html"

          cat <<EOF > teams-payload.json
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "Smoke Tests Failed",
                      "weight": "Bolder",
                      "size": "Large",
                      "color": "Attention"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Suite", "value": "Smoke Tests" },
                        { "title": "Repo", "value": "${REPOSITORY_OWNER}/${REPOSITORY_NAME}" },
                        { "title": "Branch", "value": "${BRANCH_NAME}" },
                        { "title": "Run", "value": "#${RUN_NUMBER}" },
                        { "title": "Triggered by", "value": "${TRIGGERED_BY}" }
                      ]
                    },
                    {
                      "type": "TextBlock",
                      "text": "Open the GitHub Actions run for logs and the published Playwright report for failure details.",
                      "wrap": true
                    }
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "Open GitHub Run",
                      "url": "${RUN_URL}"
                    },
                    {
                      "type": "Action.OpenUrl",
                      "title": "Open Playwright Report",
                      "url": "${REPORT_URL}"
                    }
                  ]
                }
              }
            ]
          }
          EOF

          curl -X POST \
            -H "Content-Type: application/json" \
            --data @teams-payload.json \
            "$TEAMS_WEBHOOK_URL"
