name: Smoke Tests

on:
  workflow_dispatch:

  schedule:
    # Runs daily at 6:00 AM Central (11:00 UTC). GitHub cron uses UTC.
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  smoke-tests:
    name: Run Smoke Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.6
        with:
          fetch-depth: 1

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      - name: Setup Node
        uses: actions/setup-node@v4.0.1
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests
        id: run-smoke-tests
        run: npx playwright test --grep @smoke

      - name: Save smoke report for dashboard
        if: always()
        run: |
          mkdir -p dashboard/smoke
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/smoke/last-run.json
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/smoke/playwright-report
            cp -R playwright-report dashboard/smoke/
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload smoke report artifact
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: smoke-playwright-report
          path: playwright-report/
          retention-days: 1
          if-no-files-found: warn

      - name: Clean up old reports
        if: always()
        run: bash scripts/cleanup-old-reports.sh

      - name: Publish smoke report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: true

      - name: Notify Teams on smoke result
        if: always()
        uses: ./.github/actions/teams-notify
        with:
          webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
          suite_name: Smoke Tests
          status: ${{ steps.run-smoke-tests.outcome }}
          report_path: smoke/playwright-report/index.html
