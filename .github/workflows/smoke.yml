name: Smoke Tests

# For testing only, will not be needed after June 16th
env: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true

on:
  workflow_dispatch:

  schedule:
    # Runs daily at 8:00 AM Central during daylight saving time.
    # GitHub cron uses UTC.
    - cron: "0 13 * * *"

permissions:
  contents: write

concurrency:
  group: dashboard-publish
  cancel-in-progress: false

jobs:
  smoke-tests:
    name: Run Smoke Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore existing dashboard contents
        run: |
          mkdir -p dashboard
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git --work-tree=dashboard checkout origin/gh-pages -- .
          fi

      # For testing only, can change back to "node-version: lts/*"" after June 16
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests
        run: npx playwright test --grep @smoke

      - name: Save smoke report for dashboard
        if: always()
        run: |
          mkdir -p dashboard/smoke
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}" > dashboard/smoke/last-run.json
          if [ -d "playwright-report" ]; then
            rm -rf dashboard/smoke/playwright-report
            cp -R playwright-report dashboard/smoke/
          fi

      - name: Build dashboard homepage
        if: always()
        run: node scripts/build-dashboard-index.js

      - name: Upload smoke report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Publish smoke report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dashboard
          keep_files: true
