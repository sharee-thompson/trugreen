<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruGreen Performance Audit</title>
  <style>
    :root {
      --navy: #172b4d;
      --text: #0f2144;
      --muted: #5e6c84;
      --background: #f7f9fb;
      --card: #ffffff;
      --border: #dfe1e6;
      --button: #2563b8;
      --button-hover: #174ea6;
      --shadow: rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: var(--background);
      color: var(--text);
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      color: var(--navy);
      font-size: 32px;
    }

    p {
      line-height: 1.5;
      margin-bottom: 0;
    }

    .meta {
      color: var(--muted);
      margin-top: 8px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    a.button {
      display: inline-block;
      padding: 12px 18px;
      background: var(--button);
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    a.button:hover {
      background: var(--button-hover);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>TruGreen Performance Audit</h1>
      <p>This report includes the latest aggregated performance history generated by the performance audit workflow.</p>
      <p class="meta">The CSV includes performance metrics by run, project, device profile, page, and URL.</p>

      <div class="links">
        <a class="button" href="./performance-history-seconds.csv" target="_blank" rel="noopener noreferrer">View Performance History CSV</a>
      </div>
    </section>
  </main>
</body>
</html>
